name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  frontend:
    name: Frontend (typecheck + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'changeset-release/')
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run check

  rust:
    name: Rust (fmt + clippy)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'changeset-release/')
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  build:
    name: Build (windows)
    needs: [frontend, rust]
    if: github.event_name != 'push'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: bun install (retry on hang)
        shell: bash
        run: |
          for i in 1 2 3; do
            timeout 300 bun install --frozen-lockfile
            code=$?
            [ $code -eq 0 ] && exit 0
            [ $code -ne 124 ] && exit $code
            echo "bun install hung (attempt $i), retrying"
          done
          exit 1
      - name: Build app (no bundle)
        run: bun run tauri build --no-bundle
