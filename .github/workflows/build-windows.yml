name: Build Windows (test)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (windows x86_64)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: bun install (retry on hang)
        shell: bash
        run: |
          for i in 1 2 3; do
            timeout 300 bun install --frozen-lockfile
            code=$?
            [ $code -eq 0 ] && exit 0
            [ $code -ne 124 ] && exit $code
            echo "bun install hung (attempt $i), retrying"
          done
          exit 1

      - name: Build msi + nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --bundles msi,nsis

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: warden-windows-x86_64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
