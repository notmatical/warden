name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          # We only use the publish step to signal `published=true`; the real
          # release tag (warden-v<version>) and GitHub release are cut by the
          # build job's tauri-action. Disable the action's own tag push, which
          # would otherwise try to push a non-existent `v<version>` tag.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.name }})
    needs: version
    if: needs.version.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            args: --bundles msi,nsis
          # ubuntu-22.04 on purpose: binaries link against the oldest glibc /
          # webkit2gtk we support, so deb/rpm/AppImage run on 22.04 and newer.
          - name: linux
            os: ubuntu-22.04
            args: --bundles deb,rpm
          # macOS ships unsigned for now (no Apple Developer account): the .dmg
          # is updater-signed but not notarized, so Gatekeeper requires the user
          # to right-click -> Open. Wire the APPLE_* signing env into the build
          # step below once an account is available.
          - name: macos
            os: macos-latest
            args: --target universal-apple-darwin --bundles app,dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal targets
        if: matrix.name == 'macos'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libfuse2
      - run: bun install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          tagName: warden-v__VERSION__
          releaseName: "Warden v__VERSION__"
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # The AppImage is built outside tauri-action so its AppRun can be
      # swapped for the distro-portable launcher (see scripts/build-appimage.sh),
      # then signed and attached to the same release.
      - name: Build AppImage
        if: matrix.name == 'linux'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/build-appimage.sh

      - name: Upload AppImage to release
        if: matrix.name == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(jq -r .version src-tauri/tauri.conf.json)"
          gh release upload "warden-v${VERSION}" \
            src-tauri/target/release/bundle/appimage/Warden_*.AppImage* --clobber

  # tauri-action only writes updater entries for the bundles it built itself,
  # so the AppImage (built above, outside the action) is added to latest.json
  # here — after every matrix leg has finished uploading, to avoid clobbering.
  updater-manifest:
    name: Updater manifest (linux)
    needs: [version, build]
    if: needs.version.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Add Linux AppImage entry to latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="$(jq -r .version src-tauri/tauri.conf.json)"
          TAG="warden-v${VERSION}"
          mkdir updater && cd updater
          gh release download "$TAG" --repo "$REPO" --pattern 'latest.json'
          gh release download "$TAG" --repo "$REPO" --pattern '*.AppImage.sig' || true
          SIG_FILE="$(ls ./*.AppImage.sig 2>/dev/null | head -n 1 || true)"
          if [ -z "$SIG_FILE" ]; then
            echo "no signed AppImage on the release; leaving latest.json unchanged"
            exit 0
          fi
          ASSET="$(basename "${SIG_FILE%.sig}")"
          URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}"
          jq --arg sig "$(cat "$SIG_FILE")" --arg url "$URL" \
            '.platforms["linux-x86_64"] = {signature: $sig, url: $url}' \
            latest.json > latest.json.tmp
          mv latest.json.tmp latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
