name: Release

on:
  push:
    branches: [main]
  # Manual escape hatch: force a build/release of the currently-committed version.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Opens/updates a "Version Packages" PR while changesets are pending. When that
  # PR is merged (no changesets left), the publish step fires and flags a release.
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Builds + signs the Windows installers and publishes them to a GitHub Release.
  # Runs only when `version` flagged a release (or on a manual dispatch).
  # (macOS/Linux are intentionally out of scope for now — add matrix entries to
  # ship them later.)
  build:
    name: Build (windows)
    needs: version
    if: needs.version.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - run: bun install --frozen-lockfile

      # tauri-action reads the version from the (already-synced) tauri.conf.json,
      # creates/updates the GitHub Release for the tag, and uploads the bundles.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (optional until the updater is configured).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          tagName: warden-v__VERSION__
          releaseName: "Warden v__VERSION__"
          includeUpdaterJson: true
          args: "--bundles msi,nsis"
